name: Build AeroLink Firmware

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32s2, esp32s3, esp32c5, esp32c6]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ESP-IDF Build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: ${{ matrix.target }}

      - name: Upload All Build Files
        uses: actions/upload-artifact@v4
        with:
          name: aerolink-${{ matrix.target }}
          path: |
            build/aerolink.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware
          pattern: aerolink-*
        continue-on-error: true

      - name: Create Flash Packages
        run: |
          mkdir -p release
          for dir in firmware/aerolink-*; do
            [ -d "$dir" ] || continue
            target=$(basename "$dir" | sed 's/aerolink-//')

            # Copy individual firmware file
            cp "$dir/aerolink.bin" "release/aerolink-${target}.bin"

            # Create complete flash zip for this target
            mkdir -p "zip/${target}"
            cp "$dir/bootloader/bootloader.bin" "zip/${target}/"
            cp "$dir/partition_table/partition-table.bin" "zip/${target}/"
            cp "$dir/ota_data_initial.bin" "zip/${target}/"
            cp "$dir/aerolink.bin" "zip/${target}/"
            cd zip && zip -r "../release/aerolink-${target}-flash.zip" "${target}/" && cd ..
            rm -rf "zip/${target}"
          done
          echo "=== Release files ==="
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "AeroLink Firmware — Build #${{ github.run_number }}"
          body: |
            ## AeroLink Firmware

            ### Quick Flash (complete package)
            Download the **`aerolink-<board>-flash.zip`** for your board. It contains everything:
            - `bootloader.bin` → flash at `0x0`
            - `partition-table.bin` → flash at `0x8000`
            - `ota_data_initial.bin` → flash at `0xe000`
            - `aerolink.bin` → flash at `0x20000`

            ### OTA Update (firmware only)
            Download **`aerolink-<board>.bin`** and flash via the web dashboard at `http://192.168.4.1`

            ### Flash Instructions (USB)
            1. Download the `-flash.zip` for your board
            2. Extract all 4 `.bin` files
            3. Connect ESP32 via USB
            4. Flash each file to its address:
               | File | Address |
               |------|---------|
               | `bootloader.bin` | `0x0` |
               | `partition-table.bin` | `0x8000` |
               | `ota_data_initial.bin` | `0xe000` |
               | `aerolink.bin` | `0x20000` |
            5. Open serial monitor at 115200 baud
            6. Connect to `AeroLink` WiFi → open `http://192.168.4.1`
          files: release/*
          make_latest: true
